<style>
/* Section heading style */
.page__content h2 {
  margin-top: 2em;
  margin-bottom: 0.8em;
  font-size: 1.1em;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #2563eb;
}

/* Dark mode toggle button */
#theme-toggle {
  position: fixed;
  top: 14px;
  right: 18px;
  z-index: 1000;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  cursor: pointer;
  padding: 0.5em 1em;
  font-size: 1em;
  font-weight: 600;
  color: #475569;
  line-height: 1;
  display: flex;
  align-items: center;
  gap: 0.4em;
  transition: all 0.2s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
#theme-toggle:hover {
  background: #f1f5f9;
  color: #1e293b;
}
html.dark-mode #theme-toggle {
  background: #1e293b;
  border-color: #334155;
  color: #94a3b8;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
html.dark-mode #theme-toggle:hover {
  background: #334155;
  color: #f1f5f9;
}

/* ── Dark mode ── */
html.dark-mode {
  --bg: #0f172a;
  --surface: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --primary: #f1f5f9;
  --link: #60a5fa;
  --link-hover: #93c5fd;
}
html.dark-mode body,
html.dark-mode .page,
html.dark-mode .page__content {
  background-color: #0f172a;
  color: #e2e8f0;
}
html.dark-mode .masthead {
  background-color: #1e293b;
  border-bottom-color: #334155;
}
html.dark-mode .masthead a,
html.dark-mode .masthead__menu-item a {
  color: #e2e8f0;
}
html.dark-mode .masthead__menu-item--lg a {
  color: #f1f5f9;
}
html.dark-mode #theme-toggle {
  border-color: #334155;
  color: #94a3b8;
}
html.dark-mode #theme-toggle:hover {
  background: #334155;
  color: #f1f5f9;
}
html.dark-mode .sidebar,
html.dark-mode .author__urls {
  background-color: #0f172a;
}
html.dark-mode .author__name,
html.dark-mode .sidebar .author__name {
  color: #f1f5f9;
}
html.dark-mode .author__bio {
  color: #94a3b8;
}
html.dark-mode .author__urls a {
  color: #94a3b8;
}
html.dark-mode .author__urls a:hover {
  color: #60a5fa;
}
html.dark-mode .author__avatar img {
  border-color: #334155;
}
html.dark-mode a {
  color: #60a5fa;
}
html.dark-mode h1,
html.dark-mode h2,
html.dark-mode h3,
html.dark-mode h4 {
  color: #f1f5f9;
}
html.dark-mode .page__content h2 {
  color: #60a5fa;
}
html.dark-mode .page__footer {
  background-color: #1e293b;
  color: #94a3b8;
}
html.dark-mode .page__footer a {
  color: #94a3b8;
}
html.dark-mode .greedy-nav {
  background: #1e293b;
}
html.dark-mode .experience-item {
  background: #1e293b;
  border-left-color: #3b82f6;
}
html.dark-mode .experience-role {
  color: #f1f5f9;
}
html.dark-mode .experience-company {
  color: #60a5fa;
}
html.dark-mode .experience-date,
html.dark-mode .experience-item ul li {
  color: #94a3b8;
}
html.dark-mode .skill-tag {
  background: #1e3a5f;
  color: #93c5fd;
  border-color: #1d4ed8;
}
html.dark-mode .bio-body strong {
  color: #f1f5f9;
}
html.dark-mode .bio-body span,
html.dark-mode .bio-date {
  color: #94a3b8;
}
html.dark-mode .pub-venue {
  background: #1d4ed8;
}
html.dark-mode .pub-year,
html.dark-mode .pub-authors {
  color: #94a3b8;
}
html.dark-mode .pub-authors strong {
  color: #e2e8f0;
}
html.dark-mode .pub-btn--paper {
  background: #1e3a5f;
  color: #93c5fd;
  border-color: #1d4ed8;
}
html.dark-mode .pub-btn--slides {
  background: #14532d;
  color: #86efac;
  border-color: #166534;
}
html.dark-mode .archive__item-title a {
  color: #e2e8f0;
}
html.dark-mode .archive__item-title a:hover {
  color: #60a5fa;
}

/* Publication list styles */
.pub-meta {
  margin: 0.2em 0 0.4em;
  display: flex;
  align-items: center;
  gap: 0.5em;
}
.pub-venue {
  background: #2563eb;
  color: #fff;
  font-size: 0.75em;
  font-weight: 700;
  padding: 0.15em 0.6em;
  border-radius: 4px;
  letter-spacing: 0.03em;
}
.pub-year {
  font-size: 0.82em;
  color: #64748b;
}
.pub-authors {
  font-size: 0.88em !important;
  color: #475569;
  margin: 0.3em 0 0.5em !important;
}
.pub-authors p { margin: 0; }
.pub-authors strong { color: #1e293b; }
.pub-links {
  margin-top: 0.5em;
  display: flex;
  gap: 0.5em;
  flex-wrap: wrap;
}
.pub-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.35em;
  padding: 0.3em 0.8em;
  border-radius: 5px;
  font-size: 0.8em;
  font-weight: 600;
  text-decoration: none !important;
  transition: opacity 0.15s ease;
}
.pub-btn:hover { opacity: 0.8; }
.pub-btn--paper {
  background: #eff6ff;
  color: #2563eb;
  border: 1px solid #bfdbfe;
}
.pub-btn--slides {
  background: #f0fdf4;
  color: #16a34a;
  border: 1px solid #bbf7d0;
}

.experience-item {
  margin-bottom: 1.6em;
  padding: 1em 1.2em;
  border-left: 3px solid #2563eb;
  background: #f8fafc;
  border-radius: 0 6px 6px 0;
}
.experience-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 0.4em;
}
.experience-role {
  font-weight: 600;
  font-size: 1em;
  color: #1e293b;
}
.experience-date {
  font-size: 0.85em;
  color: #64748b;
  white-space: nowrap;
}
.experience-company {
  font-size: 0.9em;
  color: #2563eb;
  margin-top: 0.2em;
  margin-bottom: 0.5em;
  font-weight: 500;
}
.experience-item ul {
  margin: 0;
  padding-left: 1.2em;
}
.experience-item ul li {
  font-size: 0.95em;
  color: #334155;
  line-height: 1.6;
}

<script>
  (function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      document.documentElement.classList.add('dark-mode');
    }
  })();
  // Set initial button state after DOM ready
  document.addEventListener('DOMContentLoaded', function() {
    var label = document.getElementById('theme-label');
    var icon = document.getElementById('theme-icon');
    if (!label || !icon) return;
    var isDark = document.documentElement.classList.contains('dark-mode');
    label.textContent = isDark ? 'Night' : 'Day';
    icon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
  });
</script>
